<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10 bg-gray-50">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-sm">
        <h1 class="text-xl font-bold mb-6">Select a Destination to Edit</h1>
        <div id="trip-list" class="space-y-2 mb-10"></div>

        <div id="editor" class="hidden border-t pt-10">
            <h2 id="editor-title" class="text-2xl font-bold mb-6"></h2>
            
            <div class="grid grid-cols-3 gap-4">
                <div class="space-y-2">
                    <h3 class="font-bold">Compass</h3>
                    <textarea id="c_details" class="w-full border p-2" placeholder="Details"></textarea>
                    <input type="text" id="c_caption" class="w-full border p-2" placeholder="Caption">
                </div>
                <div class="space-y-2">
                    <h3 class="font-bold">Chronicles</h3>
                    <textarea id="ch_details" class="w-full border p-2" placeholder="Details"></textarea>
                    <input type="text" id="ch_caption" class="w-full border p-2" placeholder="Caption">
                </div>
                <div class="space-y-2">
                    <h3 class="font-bold">Corners</h3>
                    <textarea id="co_details" class="w-full border p-2" placeholder="Details"></textarea>
                    <input type="text" id="co_caption" class="w-full border p-2" placeholder="Caption">
                </div>
            </div>
            <button id="save-btn" class="mt-6 bg-black text-white px-8 py-3">Save All Changes</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com" }));
        let activeId = null;

        // 1. Fetch and List trips
        onValue(ref(db, 'itineraries'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('trip-list');
            if(data) {
                list.innerHTML = Object.keys(data).map(key => `
                    <button class="block w-full text-left p-4 border rounded hover:bg-gray-100" 
                            onclick="window.loadTrip('${key}', '${data[key].name}')">
                        ${data[key].name}
                    </button>
                `).join('');
            }
        });

        // 2. Load into editor
        window.loadTrip = (id, name) => {
            activeId = id;
            document.getElementById('editor-title').innerText = "Editing: " + name;
            document.getElementById('editor').classList.remove('hidden');
        };

        // 3. Save to Firebase
        document.getElementById('save-btn').onclick = async () => {
            const data = {
                compass: { details: document.getElementById('c_details').value, caption: document.getElementById('c_caption').value },
                chronicles: { details: document.getElementById('ch_details').value, caption: document.getElementById('ch_caption').value },
                corners: { details: document.getElementById('co_details').value, caption: document.getElementById('co_caption').value }
            };
            await set(ref(db, `itineraries/${activeId}/grids`), data);
            alert("Data saved successfully!");
        };
    </script>
</body>
</html>
