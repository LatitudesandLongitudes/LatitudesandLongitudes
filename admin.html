<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Architect | Latitudes & Longitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #faf9f6; font-family: 'Montserrat', sans-serif; color: #2d2a26; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .input-box { border: 1px solid #e0dbd1; padding: 12px; width: 100%; margin-bottom: 20px; background: white; border-radius: 2px; }
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.6; margin-bottom: 8px; display: block; }
    </style>
</head>
<body class="p-8 md:p-20">

    <div class="max-w-3xl mx-auto">
        <header class="mb-12 border-b border-stone-200 pb-8 flex justify-between items-end">
            <div>
                <h1 class="serif text-5xl text-[#8d5d46]">Admin Mode</h1>
                <p class="text-[10px] tracking-widest uppercase opacity-40 mt-2">Manage the Archive</p>
            </div>
            <a href="index.html" class="text-[10px] tracking-widest uppercase border-b border-black pb-1">View Website</a>
        </header>

        <div id="status-msg" class="hidden mb-8 p-4 text-sm text-center border"></div>

        <div class="bg-white p-10 border border-stone-200 shadow-sm mb-16">
            <h2 class="serif text-2xl mb-6 italic">Add New Narrative</h2>
            <label>Journey Name</label>
            <input type="text" id="tripName" placeholder="e.g. Exploring Rocky Mountain" class="input-box">

            <div class="grid grid-cols-2 gap-4">
                <div><label>Continent</label><input type="text" id="tripContinent" class="input-box"></div>
                <div><label>Country</label><input type="text" id="tripCountry" class="input-box"></div>
            </div>

            <label>Main Image URL</label>
            <input type="text" id="tripPhoto" class="input-box">

            <label>The Narrative</label>
            <textarea id="tripStory" class="input-box h-32"></textarea>

            <button id="submitBtn" class="w-full bg-black text-white py-5 text-[11px] uppercase tracking-[0.5em] hover:bg-[#8d5d46] transition-all">
                Publish to Website
            </button>
        </div>

        <div class="bg-stone-50 p-10 border border-stone-200">
            <h2 class="serif text-2xl mb-8 italic text-[#8d5d46]">Current Archive</h2>
            <div id="archive-list" class="space-y-4">
                <p class="text-xs opacity-40 italic">Loading your journeys...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
            messagingSenderId: "831088196667",
            appId: "1:831088196667:web:3b54c623a82d04febbf01e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. ADD DATA
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const tripData = {
                name: document.getElementById('tripName').value,
                continent: document.getElementById('tripContinent').value,
                country: document.getElementById('tripCountry').value,
                photo: document.getElementById('tripPhoto').value,
                story: document.getElementById('tripStory').value,
                timestamp: Date.now()
            };

            if(!tripData.name) return alert("Please enter a name");

            try {
                await push(ref(db, 'itineraries'), tripData);
                alert("Published!");
                document.querySelectorAll('input, textarea').forEach(el => el.value = "");
            } catch (e) { alert(e.message); }
        });

        // 2. LOAD & DELETE DATA
        const archiveList = document.getElementById('archive-list');
        onValue(ref(db, 'itineraries'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                archiveList.innerHTML = Object.keys(data).map(key => `
                    <div class="flex justify-between items-center bg-white p-4 border border-stone-200 group">
                        <div>
                            <p class="font-medium text-sm">${data[key].name}</p>
                            <p class="text-[9px] opacity-40 uppercase tracking-widest">${data[key].country || 'Global'}</p>
                        </div>
                        <button onclick="window.deleteTrip('${key}')" class="text-[9px] tracking-widest uppercase text-red-400 hover:text-red-700 transition-colors">
                            Delete
                        </button>
                    </div>
                `).reverse().join('');
            } else {
                archiveList.innerHTML = "<p class='text-xs opacity-40'>No trips found in the archive.</p>";
            }
        });

        // Make delete function global
        window.deleteTrip = (id) => {
            if(confirm("Are you sure you want to remove this journey from the archive?")) {
                remove(ref(db, `itineraries/${id}`))
                    .then(() => alert("Entry removed."))
                    .catch((e) => alert("Error: " + e.message));
            }
        };
    </script>
</body>
</html>
