<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Add Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 p-10 font-serif">
    <div class="max-w-2xl mx-auto bg-white p-12 shadow-sm rounded">
        <h2 class="text-3xl italic mb-8 border-b pb-4">Add New Journey Log</h2>
        <input type="text" id="title" placeholder="സ്ഥലത്തിന്റെ പേര് (Title)" class="w-full p-4 mb-4 border rounded">
        <textarea id="content" placeholder="യാത്രാ വിവരങ്ങൾ (Story)" class="w-full p-4 mb-4 border h-48 rounded"></textarea>
        <button onclick="savePost()" class="w-full bg-black text-white py-4 uppercase tracking-widest hover:bg-stone-800 transition">Publish to Site</button>
        <a href="index.html" class="block text-center mt-6 text-stone-400 text-sm">Back to Home</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyfXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com/",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
            messagingSenderId: "831088196667",
            appId: "1:831088196667:web:3b54c623a82d04febbf01e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.savePost = function() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            if(!title || !content) return alert("ദയവായി എല്ലാം പൂരിപ്പിക്കുക!");

            const newPostRef = push(ref(db, 'posts'));
            set(newPostRef, {
                title: title,
                content: content,
                date: new Date().toISOString()
            }).then(() => {
                alert("സന്തോഷവാർത്ത! നിങ്ങളുടെ പുതിയ പോസ്റ്റ് സൈറ്റിൽ വന്നിരിക്കുന്നു.");
                window.location.href = "index.html";
            });
        }
    </script>
</body>
</html>
