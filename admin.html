<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Architect | Latitudes & Longitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfbf7; font-family: 'Montserrat', sans-serif; color: #2d2a26; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .input-box { border: 1px solid #e2ded5; padding: 14px; width: 100%; margin-bottom: 24px; background: white; transition: border 0.3s; }
        .input-box:focus { border-color: #8d5d46; outline: none; }
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; opacity: 0.6; margin-bottom: 10px; display: block; font-weight: 500; }
    </style>
</head>
<body class="p-6 md:p-20">

    <div class="max-w-4xl mx-auto">
        <header class="mb-16 border-b border-stone-200 pb-10 flex justify-between items-end">
            <div>
                <h1 class="serif text-4xl text-[#8d5d46] font-light italic">Admin Architect</h1>
                <p class="text-[9px] tracking-widest uppercase opacity-40 mt-1">Data Input Architecture</p>
            </div>
            <a href="index.html" class="text-[10px] tracking-widest uppercase border-b border-black pb-1 hover:text-[#8d5d46] transition-colors">Return to Site</a>
        </header>

        <section class="bg-white p-8 md:p-12 border border-stone-200 shadow-sm mb-16">
            <h2 class="serif text-2xl mb-8 italic text-stone-700">1. Publish Main Narrative</h2>
            <div class="grid md:grid-cols-2 gap-6">
                <div><label>Journey Designation</label><input type="text" id="tripName" class="input-box"></div>
                <div><label>Geographic Country</label><input type="text" id="tripCountry" class="input-box"></div>
            </div>
            <label>Cover Image Resource URL</label><input type="text" id="tripPhoto" class="input-box">
            <label>Poetic Overview Introduction</label><textarea id="tripStory" class="input-box h-32"></textarea>
            <button id="submitBtn" class="w-full bg-stone-900 text-white py-5 text-[10px] uppercase tracking-[0.5em] hover:bg-[#8d5d46] transition-all">Archive Base Entry</button>
        </section>

        <section class="bg-stone-50 p-8 md:p-12 border border-stone-200 mb-16">
            <h2 class="serif text-2xl mb-8 italic text-stone-700">2. Current Database Index</h2>
            <div id="archive-list" class="space-y-4"></div>
        </section>

        <section id="itinerary-editor" class="hidden bg-white p-8 md:p-12 border-2 border-[#8d5d46] shadow-xl">
            <h2 id="selected-trip-name" class="serif text-2xl mb-8 italic text-[#8d5d46]"></h2>
            <label>Chronological Sequence / Location Title</label><input type="text" id="dayTitle" class="input-box">
            <label>Granular Structural Content</label><textarea id="dayContent" class="input-box h-44"></textarea>
            <div class="flex gap-4">
                <button id="addDayBtn" class="flex-1 bg-stone-900 text-white py-4 text-[10px] uppercase tracking-widest hover:bg-[#8d5d46] transition-all">Append Node to Compass</button>
                <button id="closeEditorBtn" class="px-8 border border-stone-300 text-[10px] uppercase">Close Context</button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
            messagingSenderId: "831088196667",
            appId: "1:831088196667:web:3b54c623a82d04febbf01e"
        };

        const db = getDatabase(initializeApp(firebaseConfig));
        let activeId = null;

        // Archive Base Entry
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const data = {
                name: document.getElementById('tripName').value,
                country: document.getElementById('tripCountry').value,
                photo: document.getElementById('tripPhoto').value,
                story: document.getElementById('tripStory').value
            };
            if(!data.name) return alert('Name required.');
            await push(ref(db, 'itineraries'), data);
            alert("Entry archived.");
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
        });

        // Load Index
        onValue(ref(db, 'itineraries'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('archive-list');
            list.innerHTML = data ? Object.keys(data).map(key => `
                <div class="flex justify-between items-center bg-white p-5 border border-stone-200">
                    <div><p class="font-medium">${data[key].name}</p><p class="text-[9px] uppercase tracking-widest opacity-40">${data[key].country || 'Global'}</p></div>
                    <div class="flex gap-4 text-[10px] uppercase">
                        <button onclick="window.openEditor('${key}', '${data[key].name}')" class="text-blue-600">Details</button>
                        <button onclick="window.deleteTrip('${key}')" class="text-red-400">Delete</button>
                    </div>
                </div>
            `).reverse().join('') : '<p class="text-xs opacity-40">Index is empty.</p>';
        });

        // Editor Functions
        window.openEditor = (id, name) => {
            activeId = id;
            document.getElementById('itinerary-editor').classList.remove('hidden');
            document.getElementById('selected-trip-name').innerText = "Target: " + name;
            document.getElementById('itinerary-editor').scrollIntoView({behavior:'smooth'});
        };

        document.getElementById('addDayBtn').addEventListener('click', async () => {
            if(!activeId) return;
            await push(ref(db, `itineraries/${activeId}/days`), {
                title: document.getElementById('dayTitle').value,
                content: document.getElementById('dayContent').value
            });
            alert("Node appended.");
            document.getElementById('dayTitle').value = ""; document.getElementById('dayContent').value = "";
        });

        document.getElementById('closeEditorBtn').onclick = () => document.getElementById('itinerary-editor').classList.add('hidden');
        window.deleteTrip = (id) => { if(confirm("Delete this entry?")) remove(ref(db, `itineraries/${id}`)); };
    </script>
</body>
</html>
