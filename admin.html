<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Latitudes and Longitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #faf9f6; font-family: 'Montserrat', sans-serif; color: #2d2a26; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        input, textarea { background: transparent; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-12 border-b border-stone-200 pb-6">
            <div>
                <h1 class="serif text-5xl text-[#8d5d46]">Journal Manager</h1>
                <p class="text-[10px] tracking-[0.3em] uppercase opacity-50 mt-2">Latitudes and Longitudes Content Suite</p>
            </div>
            <a href="index.html" class="text-[10px] tracking-widest uppercase border border-stone-300 px-4 py-2 hover:bg-black hover:text-white transition-all">View Live Site</a>
        </div>

        <div class="grid lg:grid-cols-3 gap-12">
            <div class="lg:col-span-1 bg-white p-8 shadow-sm border border-stone-100 h-fit sticky top-10">
                <h2 class="serif text-2xl mb-6">Create New Story</h2>
                <div class="space-y-5">
                    <div>
                        <label class="block text-[9px] tracking-widest uppercase mb-1 opacity-60">Location</label>
                        <input type="text" id="postTitle" placeholder="e.g., Hidden Valleys of Colorado" 
                            class="w-full border-b border-stone-200 py-2 focus:outline-none focus:border-[#8d5d46]">
                    </div>
                    <div>
                        <label class="block text-[9px] tracking-widest uppercase mb-1 opacity-60">Cover Image URL</label>
                        <input type="text" id="postImage" placeholder="Paste link here..." 
                            class="w-full border-b border-stone-200 py-2 focus:outline-none focus:border-[#8d5d46]">
                    </div>
                    <div>
                        <label class="block text-[9px] tracking-widest uppercase mb-1 opacity-60">The Narrative</label>
                        <textarea id="postContent" rows="6" placeholder="Write your journey..." 
                            class="w-full border border-stone-100 p-3 text-sm focus:outline-none focus:border-[#8d5d46]"></textarea>
                    </div>
                    <button onclick="savePost()" class="w-full bg-[#8d5d46] text-white py-4 text-[10px] tracking-[0.3em] uppercase hover:bg-[#2d2a26] transition-all">
                        Publish to Live Feed
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h2 class="serif text-2xl mb-6">Existing Entries</h2>
                <div id="entries-list" class="space-y-4">
                    <p class="opacity-40 italic">Syncing with database...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
            messagingSenderId: "831088196667",
            appId: "1:831088196667:web:3b54c623a82d04febbf01e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. READ & MANAGE ENTRIES
        const entriesList = document.getElementById('entries-list');
        onValue(ref(db, 'posts'), (snapshot) => {
            const data = snapshot.val();
            entriesList.innerHTML = '';
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const post = data[key];
                    const item = document.createElement('div');
                    item.className = 'bg-white p-5 flex justify-between items-center border border-stone-100 shadow-sm hover:border-stone-300 transition-all';
                    item.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-stone-100 overflow-hidden">
                                <img src="${post.image}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <h3 class="serif text-xl">${post.title}</h3>
                                <p class="text-[9px] opacity-40 uppercase tracking-tighter">${new Date(post.date).toDateString()}</p>
                            </div>
                        </div>
                        <button onclick="deletePost('${key}')" class="text-[9px] tracking-widest uppercase text-red-400 hover:text-red-700 font-bold">Delete</button>
                    `;
                    entriesList.appendChild(item);
                });
            } else {
                entriesList.innerHTML = '<p class="opacity-40 italic">No stories found in the archive.</p>';
            }
        });

        // 2. SAVE POST
        window.savePost = function() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const image = document.getElementById('postImage').value || "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1";
            
            if(!title || !content) return alert("Fields cannot be empty.");

            const newRef = push(ref(db, 'posts'));
            set(newRef, { title, content, image, date: new Date().toISOString() })
            .then(() => {
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
                document.getElementById('postImage').value = '';
            });
        };

        // 3. DELETE POST
        window.deletePost = function(key) {
            if(confirm("Are you sure you want to delete this memory?")) {
                remove(ref(db, `posts/${key}`));
            }
        };
    </script>
</body>
</html>
