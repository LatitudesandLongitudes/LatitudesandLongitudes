<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Architect | Latitudes & Longitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #faf9f6; font-family: 'Montserrat', sans-serif; color: #2d2a26; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .input-box { border: 1px solid #e0dbd1; padding: 15px; width: 100%; margin-bottom: 20px; background: white; }
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.6; margin-bottom: 10px; display: block; }
    </style>
</head>
<body class="p-8 md:p-20">

    <div class="max-w-4xl mx-auto">
        <header class="mb-16 border-b border-stone-200 pb-10 flex justify-between items-end">
            <h1 class="serif text-5xl text-[#8d5d46]">Admin Architect</h1>
            <a href="index.html" class="text-[10px] tracking-widest uppercase border-b border-black">View Website</a>
        </header>

        <div class="bg-white p-10 border border-stone-200 shadow-sm mb-16">
            <h2 class="serif text-3xl mb-8 italic">New Narrative</h2>
            <div class="grid md:grid-cols-2 gap-6">
                <div><label>Journey Name</label><input type="text" id="tripName" class="input-box"></div>
                <div><label>Country</label><input type="text" id="tripCountry" class="input-box"></div>
            </div>
            <label>Cover Image URL</label><input type="text" id="tripPhoto" class="input-box">
            <label>Poetic Introduction</label><textarea id="tripStory" class="input-box h-32"></textarea>
            <button id="submitBtn" class="w-full bg-black text-white py-5 text-[11px] uppercase tracking-[0.5em] hover:bg-[#8d5d46] transition-all">Publish Narrative</button>
        </div>

        <div class="bg-stone-50 p-10 border border-stone-200 mb-16">
            <h2 class="serif text-3xl mb-10 italic">Archive Management</h2>
            <div id="archive-list" class="space-y-4"></div>
        </div>

        <div id="itinerary-editor" class="hidden bg-white p-10 border-4 border-[#8d5d46] shadow-xl">
            <h2 id="selected-trip-name" class="serif text-3xl mb-10 italic text-[#8d5d46]"></h2>
            <label>Day / Place Title</label><input type="text" id="dayTitle" placeholder="e.g. Day 1: The Mountain Ridge" class="input-box">
            <label>Detailed Observations</label><textarea id="dayContent" class="input-box h-48"></textarea>
            <div class="flex gap-4">
                <button onclick="addDay()" class="flex-1 bg-black text-white py-5 text-[10px] uppercase tracking-widest">Append to Compass</button>
                <button onclick="document.getElementById('itinerary-editor').classList.add('hidden')" class="px-8 border border-stone-300 text-[10px] uppercase">Close</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
            messagingSenderId: "831088196667",
            appId: "1:831088196667:web:3b54c623a82d04febbf01e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Publish Narrative
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const data = {
                name: document.getElementById('tripName').value,
                country: document.getElementById('tripCountry').value,
                photo: document.getElementById('tripPhoto').value,
                story: document.getElementById('tripStory').value
            };
            if(!data.name) return;
            await push(ref(db, 'itineraries'), data);
            alert("Narrative Archived.");
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
        });

        // Load List
        onValue(ref(db, 'itineraries'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('archive-list');
            if (data) {
                list.innerHTML = Object.keys(data).map(key => `
                    <div class="flex justify-between items-center bg-white p-6 border border-stone-200">
                        <div><p class="font-medium text-lg">${data[key].name}</p><p class="text-[9px] opacity-40 uppercase tracking-widest">${data[key].country || 'Global'}</p></div>
                        <div class="flex gap-6 uppercase text-[10px] tracking-widest">
                            <button onclick="window.manageItinerary('${key}', '${data[key].name}')" class="text-blue-500 hover:underline">Add Details</button>
                            <button onclick="window.deleteTrip('${key}')" class="text-red-400 hover:text-red-600">Delete</button>
                        </div>
                    </div>
                `).reverse().join('');
            }
        });

        let activeId = null;
        window.manageItinerary = (id, name) => {
            activeId = id;
            document.getElementById('itinerary-editor').classList.remove('hidden');
            document.getElementById('selected-trip-name').innerText = "Detailed Compass: " + name;
            document.getElementById('itinerary-editor').scrollIntoView({behavior:'smooth'});
        };

        window.addDay = async () => {
            const day = { title: document.getElementById('dayTitle').value, content: document.getElementById('dayContent').value };
            await push(ref(db, `itineraries/${activeId}/days`), day);
            alert("Entry Saved.");
            document.getElementById('dayTitle').value = ""; document.getElementById('dayContent').value = "";
        };

        window.deleteTrip = (id) => { if(confirm("Permanently erase this journey?")) remove(ref(db, `itineraries/${id}`)); };
    </script>
</body>
</html>
