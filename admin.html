<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
        authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
        projectId: "latitudesandlongitudes-3f37b",
        // CRITICAL: Explicitly pointing to the database instance
        databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com", 
        storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
        messagingSenderId: "831088196667",
        appId: "1:831088196667:web:3b54c623a82d04febbf01e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Using an Event Listener instead of an onclick function for modular stability
    document.getElementById('saveBtn').addEventListener('click', async () => {
        const status = document.getElementById('status');
        status.innerText = "Attempting to save...";

        const tripData = {
            name: document.getElementById('name').value,
            continent: document.getElementById('continent').value,
            country: document.getElementById('country').value,
            photo: document.getElementById('photo').value,
            story: document.getElementById('story').value,
            timestamp: Date.now()
        };

        try {
            const newListRef = push(ref(db, 'itineraries'));
            await set(newListRef, tripData);
            status.innerHTML = "✅ SAVED SUCCESSFULLY! Refresh your website.";
            // Clear input fields
            document.querySelectorAll('input, textarea').forEach(el => el.value = "");
        } catch (e) {
            status.innerHTML = "❌ FAILED: " + e.message;
            console.error("Database Error:", e);
        }
    });
</script>
