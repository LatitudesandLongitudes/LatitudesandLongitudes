<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Architect | Full Data Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .input-box { border: 1px solid #e2ded5; padding: 12px; width: 100%; margin-bottom: 15px; background: white; }
        label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.6; display: block; margin-bottom: 5px; }
    </style>
</head>
<body class="p-10 bg-[#fcfbf7]">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl italic mb-10 text-[#8d5d46]">Data Architect</h1>

        <div id="archive-list" class="mb-10 space-y-2"></div>

        <div id="itinerary-editor" class="hidden bg-white p-10 border border-stone-200">
            <h2 id="selected-trip-name" class="text-2xl mb-8 italic"></h2>
            
            <div class="grid grid-cols-3 gap-8">
                <div class="space-y-4">
                    <h3 class="font-bold text-xs uppercase tracking-widest border-b pb-2">1. Compass</h3>
                    <label>Itinerary Details</label><textarea id="c_details" class="input-box h-32"></textarea>
                    <label>Grid Caption</label><input type="text" id="c_caption" class="input-box">
                </div>

                <div class="space-y-4">
                    <h3 class="font-bold text-xs uppercase tracking-widest border-b pb-2">2. Chronicles</h3>
                    <label>Story/Narrative</label><textarea id="ch_details" class="input-box h-32"></textarea>
                    <label>Grid Caption</label><input type="text" id="ch_caption" class="input-box">
                </div>

                <div class="space-y-4">
                    <h3 class="font-bold text-xs uppercase tracking-widest border-b pb-2">3. Corners</h3>
                    <label>Place Details/Info</label><textarea id="co_details" class="input-box h-32"></textarea>
                    <label>Grid Caption</label><input type="text" id="co_caption" class="input-box">
                </div>
            </div>

            <button id="saveAllBtn" class="w-full mt-10 bg-black text-white py-4 text-[10px] uppercase tracking-[0.3em]">Save All Grids</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com" }));
        let activeId = null;

        // Save Logic
        document.getElementById('saveAllBtn').addEventListener('click', async () => {
            const data = {
                compass: { details: document.getElementById('c_details').value, caption: document.getElementById('c_caption').value },
                chronicles: { details: document.getElementById('ch_details').value, caption: document.getElementById('ch_caption').value },
                corners: { details: document.getElementById('co_details').value, caption: document.getElementById('co_caption').value }
            };
            await set(ref(db, `itineraries/${activeId}/grids`), data);
            alert("All grids updated with content and captions.");
        });

        // Load Index
        onValue(ref(db, 'itineraries'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('archive-list');
            list.innerHTML = data ? Object.keys(data).map(key => `
                <div class="flex justify-between p-4 bg-white border border-stone-100">
                    <span>${data[key].name}</span>
                    <button onclick="window.openEditor('${key}', '${data[key].name}')" class="text-blue-600 uppercase text-[9px]">Edit Grids</button>
                </div>
            `).join('') : '';
        });

        window.openEditor = (id, name) => {
            activeId = id;
            document.getElementById('itinerary-editor').classList.remove('hidden');
            document.getElementById('selected-trip-name').innerText = "Configuring: " + name;
        };
    </script>
</body>
</html>
