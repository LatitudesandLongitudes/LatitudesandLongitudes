<div class="space-y-6">
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-[9px] tracking-widest uppercase mb-1 opacity-60">Location Name</label>
            <input type="text" id="postTitle" placeholder="e.g., Isle of Skye" 
                class="w-full border-b border-stone-200 py-2 focus:outline-none focus:border-[#8d5d46]">
        </div>
        <div>
            <label class="block text-[9px] tracking-widest uppercase mb-1 opacity-60">Coordinates (Lat/Long)</label>
            <input type="text" id="postCoords" placeholder="e.g., 57.4124° N, 6.1963° W" 
                class="w-full border-b border-stone-200 py-2 focus:outline-none focus:border-[#8d5d46]">
        </div>
    </div>

    <div>
        <label class="block text-[9px] tracking-widest uppercase mb-1 opacity-60">Subtitle / Category</label>
        <input type="text" id="postSubtitle" placeholder="e.g., A Guide to the Scottish Highlands" 
            class="w-full border-b border-stone-200 py-2 focus:outline-none focus:border-[#8d5d46]">
    </div>

    <div>
        <label class="block text-[9px] tracking-widest uppercase mb-1 opacity-60">Cover Image URL</label>
        <input type="text" id="postImage" placeholder="Paste Unsplash or direct link..." 
            class="w-full border-b border-stone-200 py-2 focus:outline-none focus:border-[#8d5d46]">
    </div>

    <div>
        <label class="block text-[9px] tracking-widest uppercase mb-1 opacity-60">The Story</label>
        <textarea id="postContent" rows="6" placeholder="Start writing..." 
            class="w-full border border-stone-100 p-3 text-sm focus:outline-none focus:border-[#8d5d46]"></textarea>
    </div>

    <button onclick="savePost()" class="w-full bg-[#2d2a26] text-white py-4 text-[10px] tracking-[0.3em] uppercase hover:bg-[#8d5d46] transition-all">
        Publish Entry
    </button>
</div>

<script type="module">
    // ... (Keep your existing Firebase imports) ...

    window.savePost = function() {
        const title = document.getElementById('postTitle').value;
        const subtitle = document.getElementById('postSubtitle').value;
        const coords = document.getElementById('postCoords').value;
        const content = document.getElementById('postContent').value;
        const image = document.getElementById('postImage').value;

        if(!title || !content) return alert("Please fill in the essentials.");

        const newRef = push(ref(db, 'posts'));
        set(newRef, {
            title,
            subtitle,
            coords,
            content,
            image,
            date: new Date().toISOString()
        }).then(() => {
            alert("Entry Saved!");
            location.reload();
        });
    };
</script>
</body>
</html>
