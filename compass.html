<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
        authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
        projectId: "latitudesandlongitudes-3f37b",
        databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com",
        storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.allTrips = [];

    onValue(ref(db, 'itineraries'), (snapshot) => {
        const data = snapshot.val();
        const cardsGrid = document.getElementById('itinerary-cards-grid');
        if (data) {
            window.allTrips = Object.keys(data).map(key => ({...data[key], id: key})).reverse();
            cardsGrid.innerHTML = window.allTrips.map(t => `
                <div class="flex flex-col cursor-pointer group text-left bg-[#e4dfd5]/40 p-4 border border-[#e4dfd5] transition-all duration-300 hover:bg-[#e4dfd5]/80" onclick="openItinerary('${t.id}')">
                    <div class="w-full h-64 overflow-hidden bg-stone-200 mb-4 shadow-sm relative border border-[#dad4c5]">
                        <img src="${t.photo || ''}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-102 filter sepia-[15%]">
                    </div>
                    <h3 class="serif text-xl text-[#2e2b2a] leading-snug group-hover:text-[#8d5d46] transition-colors mb-1 font-light">${t.name}</h3>
                    <span class="text-[9px] tracking-wider text-stone-500 uppercase font-light">🗺️ ${t.country || 'Route'}</span>
                </div>
            `).join('');
        }
    });

    window.openItinerary = function(tripId) {
        const trip = window.allTrips.find(t => t.id === tripId);
        const modal = document.getElementById('itinerary-modal');
        const content = document.getElementById('modal-content');
        
        if (trip) {
            // Get rich data from the new grids node
            const compass = trip.grids?.compass || {};

            let html = `
                <div class="text-center mb-16">
                    <span class="text-[10px] tracking-[0.6em] uppercase text-stone-500">Transit & Story Map</span>
                    <h2 class="serif text-5xl italic font-light text-[#2e2b2a] mt-2">${trip.name}</h2>
                </div>

                ${compass.photo ? `<div class="mb-12"><img src="${compass.photo}" class="w-full max-h-96 object-cover border border-[#dad4c5] p-1"></div>` : ''}
                ${compass.text ? `<p class="max-w-xl mx-auto text-stone-700 italic serif text-xl mb-12">${compass.text}</p>` : ''}
                
                <div class="relative border-l border-[#dad4c5] max-w-xl mx-auto pl-8 space-y-16">
            `;

            if (trip.days) {
                Object.values(trip.days).forEach((day, index) => {
                    html += `
                        <div class="text-left">
                            <span class="serif text-5xl font-light text-[#c59b85]/40 block mb-1">${String(index+1).padStart(2,'0')}</span>
                            <h3 class="serif text-2xl italic text-[#2e2b2a] mb-2">${day.title}</h3>
                            <p class="text-stone-600 font-light text-sm leading-relaxed whitespace-pre-wrap">${day.content}</p>
                        </div>
                    `;
                });
            }
            
            html += `</div></div>`; // End of days container
            content.innerHTML = html;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
    };
    
    window.closeModal = () => { document.getElementById('itinerary-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; };
</script>
