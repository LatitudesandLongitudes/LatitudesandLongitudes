<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronicles - Narrative Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { var(--bg-earth): #f4f1ea; --text-stone: #2e2b2a; --header-olive: #8c7d62; }
        body { background-color: #f4f1ea; color: var(--text-stone); font-family: 'Montserrat', sans-serif; margin: 0; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .custom-navbar { position: absolute; top: 0; left: 0; width: 100%; z-index: 9999; display: flex; justify-content: space-between; align-items: center; padding: 40px 50px; box-sizing: border-box; }
        .nav-group { display: flex; gap: 30px; }
        .nav-link { color: #ffffff !important; text-transform: uppercase; font-size: 11px; font-weight: 300; letter-spacing: 0.3em; }
    </style>
</head>
<body>

    <header class="custom-navbar">
        <div class="nav-group">
            <a href="index.html" class="nav-link">Home</a>
            <a href="compass.html" class="nav-link">Compass</a>
            <a href="corners.html" class="nav-link">Corners</a>
            <a href="chronicles.html" class="nav-link" style="color: #c59b85 !important; font-weight: 500;">Chronicles</a>
        </div>
        <a href="index.html" class="serif text-2xl italic text-[#c59b85] lowercase no-underline">l&l</a>
    </header>

    <section class="bg-[#8c7d62] text-white pt-48 pb-24 px-6 text-center border-b border-[#796c54]">
        <h1 class="serif text-5xl md:text-6xl font-light text-white tracking-wide mb-2">Chronicles</h1>
        <p class="serif text-lg italic text-[#fdfcf7]/70 font-light">A diary of raw reflections, emotional records, and moments encountered along the map.</p>
    </section>

    <section class="max-w-4xl mx-auto px-6 py-32">
        <div id="story-grid" class="space-y-44"></div>
    </section>

    <footer class="py-12 text-center bg-[#2e2b2a] text-[#dad4c5] text-[10px] tracking-widest uppercase">
        <a href="index.html" class="hover:text-white">Return Home Cover</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'itineraries'), (snapshot) => {
            const data = snapshot.val();
            const longGrid = document.getElementById('story-grid');
            
            if (data) {
                const trips = Object.keys(data).map(key => ({...data[key], id: key})).reverse();

                longGrid.innerHTML = trips.map((t) => {
                    const chronicle = t.grids?.chronicles || {};
                    return `
                        <article class="text-left max-w-2xl mx-auto border-b border-[#dad4c5] pb-24 last:border-0">
                            <div class="w-full h-96 overflow-hidden mb-8 shadow-sm p-2 bg-[#e4dfd5] border border-[#dad4c5]">
                                <img src="${chronicle.photo || ''}" class="w-full h-full object-cover filter contrast-[1.01] brightness-[0.98] sepia-[10%]">
                            </div>
                            <span class="text-[9px] tracking-[0.5em] uppercase text-[#c59b85] font-semibold block mb-2">${t.country || 'Journal'}</span>
                            <h2 class="serif text-4xl md:text-5xl font-light italic text-[#2e2b2a] mb-6 leading-tight">${t.name}</h2>
                            
                            <div class="serif text-lg md:text-xl text-stone-700 italic font-light leading-relaxed space-y-6 antialiased">
                                <p>${chronicle.text || 'No chronicle entry yet.'}</p>
                                ${chronicle.link ? `<a href="${chronicle.link}" target="_blank" class="text-blue-600 underline text-xs">Watch/View Link</a>` : ''}
                                <p class="text-stone-400 text-xs font-sans tracking-normal not-italic mt-4">${chronicle.caption || 'Captured live from our travel diaries.'}</p>
                            </div>
                        </article>
                    `;
                }).join('');
            }
        });
    </script>
</body>
</html>
