<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
        authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
        projectId: "latitudesandlongitudes-3f37b",
        databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com",
        storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.allTrips = [];

    const earthyPalette = ['#4a5857', '#8c7d62', '#c59b85', '#9e8b70', '#5b6966', '#b08772'];

    onValue(ref(db, 'itineraries'), (snapshot) => {
        const data = snapshot.val();
        const mosaic = document.getElementById('destinations-mosaic');
        if (data) {
            window.allTrips = Object.values(data);
            let locations = [...new Set(window.allTrips.map(item => item.country).filter(Boolean))];
            if (!locations.includes("North America")) locations.unshift("North America");

            mosaic.innerHTML = locations.map((place, idx) => {
                const backgroundTone = earthyPalette[idx % earthyPalette.length];
                return `
                    <div onclick="openProfile('${place}')" style="background-color: ${backgroundTone}" class="text-white aspect-square flex flex-col items-center justify-center text-center p-6 transition-all duration-500 hover:brightness-105 cursor-pointer group">
                        <span class="serif text-xl md:text-2xl font-light tracking-wide group-hover:scale-105 transition-transform">${place}</span>
                        <span class="text-[8px] tracking-[0.3em] uppercase opacity-40 mt-3 border-t border-white/20 pt-1.5">Explore Guide</span>
                    </div>
                `;
            }).join('');
        }
    });

    window.openProfile = function(placeName) {
        // Find the trip based on the country
        const referenceData = window.allTrips.find(t => t.country === placeName) || {};
        
        // Access the new nested grids.corners structure
        const cornerData = referenceData.grids?.corners || {};

        document.getElementById('profile-title').innerText = placeName;
        document.getElementById('profile-cover').style.backgroundImage = `url('${cornerData.photo || referenceData.photo || ''}')`;
        
        // Populate the content from grids.corners
        document.getElementById('profile-history').innerText = cornerData.text || "No history notes recorded for this location.";
        document.getElementById('profile-food').innerText = cornerData.caption || "No culinary notes recorded.";

        document.getElementById('profile-img-1').src = cornerData.photo || referenceData.photo || '';
        document.getElementById('profile-img-2').src = cornerData.link || referenceData.photo || '';

        document.getElementById('hub-view').classList.add('hidden');
        document.getElementById('profile-view').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.closeProfile = function() {
        document.getElementById('profile-view').classList.add('hidden');
        document.getElementById('hub-view').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };
</script>
