<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const db = getDatabase(initializeApp({
        databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com"
    }));

    onValue(ref(db, 'itineraries'), (snapshot) => {
        const data = snapshot.val();
        console.log("Firebase Data:", data); // If this shows in the console, we are connected!
        
        if (!data) return;

        const mosaic = document.getElementById('destinations-mosaic');
        window.allTrips = Object.values(data);

        // This builds the buttons for each location
        const locations = [...new Set(window.allTrips.map(t => t.country).filter(Boolean))];
        mosaic.innerHTML = locations.map(place => `
            <div onclick="openProfile('${place}')" class="bg-[#8c7d62] text-white aspect-square flex items-center justify-center cursor-pointer hover:bg-[#6e634e]">
                <span class="serif text-xl">${place}</span>
            </div>
        `).join('');
    });

    window.openProfile = function(placeName) {
        // Find the trip for this country
        const trip = window.allTrips.find(t => t.country === placeName) || {};
        
        // Look inside 'grids' -> 'corners'
        const info = trip.grids?.corners || {}; 

        document.getElementById('profile-title').innerText = placeName;
        document.getElementById('profile-text').innerText = info.text || "No notes yet.";
        document.getElementById('profile-caption').innerText = info.caption || "No details.";
        document.getElementById('profile-img-1').src = info.photo || '';
        
        document.getElementById('hub-view').classList.add('hidden');
        document.getElementById('profile-view').classList.remove('hidden');
    };

    window.closeProfile = () => {
        document.getElementById('profile-view').classList.add('hidden');
        document.getElementById('hub-view').classList.remove('hidden');
    };
</script>
