<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Corners</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f4f1ea]">
    <h1 class="text-center text-4xl mt-10">Corners</h1>
    <div id="content" class="max-w-2xl mx-auto p-10">Loading...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const db = getDatabase(initializeApp({
            databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com"
        }));

        onValue(ref(db, 'itineraries'), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('content');
            
            if (!data) {
                container.innerHTML = "No data found in database.";
                return;
            }

            // Loop through all trips
            container.innerHTML = Object.values(data).map(trip => {
                // This looks for the new 'grids' folder
                const info = trip.grids?.corners || {};
                
                return `
                    <div class="border-b mb-10 pb-10">
                        <h2 class="text-2xl">${trip.country || 'Unknown'}</h2>
                        <p>${info.text || "No notes saved in 'grids/corners' yet."}</p>
                        <p class="text-sm text-gray-500">${info.caption || ""}</p>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
