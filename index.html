<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latitudes & Longitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfcf7; --text: #242220; --accent: #8d5d46; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Slow, cinematic ambient zoom for the cover image */
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070');
            background-size: cover; background-position: center; height: 100vh;
            animation: slowZoom 20s infinite alternate ease-in-out;
        }

        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.05); } }
        
        /* Clean menu link styling */
        .nav-link { 
            color: white; 
            mix-blend-mode: difference; 
            transition: all 0.4s ease; 
            display: inline-block;
        }
        .nav-link:hover { opacity: 0.5; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="fixed top-0 left-0 w-full z-50 px-8 py-8 md:px-12 md:py-10 flex justify-between items-center bg-transparent">
        
        <div class="flex gap-6 md:gap-8 text-[11px] tracking-[0.3em] uppercase font-light">
            <a href="index.html" class="nav-link font-medium">Home</a>
            <a href="#" class="nav-link">About</a>
            <a href="#" class="nav-link">Blog</a>
            <a href="#" class="nav-link">Places</a>
        </div>

        <div class="flex gap-6 md:gap-8 text-[10px] tracking-[0.3em] uppercase font-light">
            <a href="#" target="_blank" class="nav-link">Instagram</a>
            <a href="#" target="_blank" class="nav-link">YouTube</a>
            <a href="#" target="_blank" class="nav-link">Facebook</a>
        </div>
    </div>

    <div class="relative w-full h-screen overflow-hidden">
        <header class="hero-bg flex items-center justify-center flex-col text-center w-full h-full"></header>
        <div class="absolute inset-0 flex flex-col items-center justify-center text-center text-white pointer-events-none mix-blend-difference z-10">
            <p class="text-[10px] tracking-[0.9em] uppercase mb-4 opacity-70">The Chronicles of Exploration</p>
            <h1 class="serif text-6xl md:text-9xl italic font-light tracking-tighter">Latitudes & Longitudes</h1>
            <div class="h-[60px] w-[1px] bg-white mt-12 opacity-40"></div>
        </div>
    </div>

    <main class="py-44 bg-[#fdfcf7] relative z-20">
        <div id="story-grid" class="max-w-6xl mx-auto px-6 space-y-64">
            </div>
    </main>

    <div id="itinerary-modal" class="hidden fixed inset-0 z-[100] w-full h-full bg-[#fdfcf7] overflow-y-auto">
        <div class="max-w-4xl mx-auto px-6 py-32 relative">
            <button onclick="closeModal()" class="fixed top-12 right-12 text-[9px] tracking-[0.4em] uppercase border border-stone-200 px-6 py-3 bg-white hover:bg-black hover:text-white hover:border-black transition-all duration-300">
                Close Journal
            </button>
            <div id="modal-content" class="mt-12"></div>
        </div>
    </div>

    <footer class="py-24 text-center border-t border-stone-100 bg-[#fdfcf7]">
        <p class="serif italic opacity-30 text-2xl tracking-wide mb-8">Latitudes & Longitudes</p>
        <div class="flex justify-center gap-8 text-[9px] tracking-[0.3em] uppercase font-light opacity-50 mb-12">
            <a href="index.html" class="hover:text-[#8d5d46]">Home</a>
            <a href="#" class="hover:text-[#8d5d46]">About</a>
            <a href="#" class="hover:text-[#8d5d46]">Blog</a>
            <a href="#" class="hover:text-[#8d5d46]">Places</a>
        </div>
        <a href="admin.html" class="inline-block text-[8px] tracking-[0.4em] uppercase opacity-30 hover:opacity-100 border border-stone-200 px-5 py-2.5 transition-all">Architect Entry</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
            messagingSenderId: "831088196667",
            appId: "1:831088196667:web:3b54c623a82d04febbf01e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.allTrips = [];

        onValue(ref(db, 'itineraries'), (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('story-grid');
            if (data) {
                window.allTrips = Object.keys(data).map(key => ({...data[key], id: key})).reverse();
                
                grid.innerHTML = window.allTrips.map((t, idx) => {
                    const isEven = idx % 2 === 0;
                    return `
                        <article class="grid md:grid-cols-12 gap-12 items-center">
                            <div class="md:col-span-7 ${isEven ? 'md:order-1' : 'md:order-2'} overflow-hidden relative group shadow-sm bg-stone-100">
                                <img src="${t.photo}" class="w-full h-[65vh] object-cover filter brightness-[0.97] contrast-[1.02] sepia-[8%] transition-transform duration-[4s] ease-out group-hover:scale-105" onerror="this.src='https://placehold.co/1200x800?text=Image+Missing'">
                            </div>
                            <div class="md:col-span-5 ${isEven ? 'md:order-2 md:pl-12' : 'md:order-1 md:pr-12'} text-left mt-8 md:mt-0">
                                <span class="text-[9px] tracking-[0.5em] uppercase text-[#8d5d46] font-semibold block mb-4">${t.country || 'Universal Context'}</span>
                                <h2 class="serif text-5xl md:text-7xl font-light italic leading-[1.15] text-stone-800 mb-8">${t.name}</h2>
                                <p class="serif text-xl text-stone-500 italic font-light leading-relaxed mb-10 opacity-90">${t.story}</p>
                                <button onclick="openItinerary('${t.id}')" class="group inline-flex items-center gap-4 text-[9px] tracking-[0.5em] uppercase text-stone-400 hover:text-[#8d5d46] transition-all">
                                    <span class="border-b border-stone-200 pb-1.5 group-hover:border-[#8d5d46]">Consult the Compass</span>
                                    <span class="text-xl transition-transform duration-300 group-hover:translate-x-3">⟶</span>
                                </button>
                            </div>
                        </article>
                    `;
                }).join('');
            }
        });

        window.openItinerary = function(tripId) {
            const trip = window.allTrips.find(t => t.id === tripId);
            const modal = document.getElementById('itinerary-modal');
            const content = document.getElementById('modal-content');
            if (trip && trip.days) {
                let daysHtml = `
                    <div class="text-center mb-32">
                        <span class="text-[10px] tracking-[0.8em] uppercase opacity-40">Day-by-Day Logistics</span>
                        <h2 class="serif text-6xl md:text-8xl italic font-light mt-4 text-stone-800">${trip.name}</h2>
                        <div class="h-[1px] w-20 bg-[#8d5d46] mx-auto mt-12 opacity-30"></div>
                    </div>
                    <div class="relative border-l border-stone-200 max-w-2xl mx-auto pl-8 md:pl-16 space-y-24">
                `;
                
                Object.values(trip.days).forEach((day, index) => {
                    const displayNum = String(index + 1).padStart(2, '0');
                    daysHtml += `
                        <div class="relative">
                            <div class="absolute -left-[37px] md:-left-[69px] top-1 w-4 h-4 rounded-full bg-[#fdfcf7] border-2 border-[#8d5d46]"></div>
                            <span class="serif text-6xl md:text-7xl font-light text-stone-200 block mb-2 leading-none">${displayNum}</span>
                            <h3 class="serif text-2xl md:text-3xl italic text-stone-800 mb-4 font-medium">${day.title}</h3>
                            <p class="text-stone-500 font-light leading-relaxed text-base md:text-lg whitespace-pre-wrap">${day.content}</p>
                        </div>
                    `;
                });
                
                daysHtml += `</div>`;
                content.innerHTML = daysHtml;
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else { alert("The detailed logbook is missing entries for this configuration."); }
        };

        window.closeModal = () => { document.getElementById('itinerary-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; };
    </script>
</body>
</html>
