<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latitudes & Longitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400;1,600&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #faf9f6; --text: #2d2a26; --accent: #8d5d46; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070');
            background-size: cover; background-position: center; height: 100vh;
            display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; text-align: center;
        }

        .nav-link { mix-blend-mode: difference; color: white; transition: opacity 0.3s; }
        .nav-link:hover { opacity: 0.6; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 1.5s ease forwards; }
    </style>
</head>
<body>

    <nav class="fixed top-0 right-0 z-50 p-8 md:p-12 text-right">
        <a href="index.html" class="nav-link serif text-4xl uppercase tracking-tighter block mb-2">Home.</a>
        <div class="flex justify-end gap-6 text-[10px] tracking-[0.3em] uppercase font-medium">
            <a href="#" class="nav-link">Instagram</a>
            <a href="#" class="nav-link">YouTube</a>
            <a href="#" class="nav-link">Facebook</a>
        </div>
    </nav>

    <header class="hero-bg">
        <p class="text-[10px] tracking-[0.8em] uppercase mb-6 opacity-80">A Journey Shared</p>
        <h1 class="serif text-7xl md:text-9xl italic font-light tracking-tighter animate-fade-in">Latitudes & Longitudes</h1>
        <div class="h-[1px] w-24 bg-white mt-12 opacity-30"></div>
    </header>

    <main class="py-32 px-6">
        <div id="story-grid" class="max-w-6xl mx-auto space-y-52">
            </div>
    </main>

    <div id="itinerary-modal" class="hidden fixed inset-0 z-[100] w-full h-full bg-[#faf9f6]/98 backdrop-blur-xl overflow-y-auto">
        <div class="max-w-3xl mx-auto px-6 py-24 relative">
            <button onclick="closeModal()" class="fixed top-12 right-12 text-[10px] tracking-[0.5em] uppercase border border-stone-300 px-6 py-3 hover:bg-black hover:text-white transition-all">Close</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <footer class="py-24 text-center border-t border-stone-200">
        <p class="serif italic opacity-40 text-3xl mb-8">Latitudes & Longitudes</p>
        <a href="admin.html" class="inline-block text-[8px] tracking-[0.4em] uppercase opacity-20 hover:opacity-100 border border-stone-300 px-4 py-2">Admin Architect</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
            messagingSenderId: "831088196667",
            appId: "1:831088196667:web:3b54c623a82d04febbf01e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.allTrips = [];

        onValue(ref(db, 'itineraries'), (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('story-grid');
            if (data) {
                window.allTrips = Object.keys(data).map(key => ({...data[key], id: key})).reverse();
                grid.innerHTML = window.allTrips.map(t => `
                    <article class="group">
                        <div class="overflow-hidden mb-16 bg-stone-100 shadow-sm">
                            <img src="${t.photo}" class="w-full h-[75vh] object-cover transition-transform duration-[3s] group-hover:scale-105" onerror="this.src='https://placehold.co/1200x800?text=Image+Not+Found'">
                        </div>
                        <div class="max-w-4xl mx-auto text-center md:text-left px-4">
                            <span class="text-[10px] tracking-[0.6em] uppercase text-[#8d5d46] block mb-6">${t.country || 'Universal'}</span>
                            <h2 class="serif text-6xl md:text-8xl italic font-light leading-tight mb-8">${t.name}</h2>
                            <div class="h-[1px] w-16 bg-stone-300 mb-10 mx-auto md:mx-0"></div>
                            <p class="serif text-2xl text-stone-600 italic font-light leading-relaxed mb-12 opacity-90">${t.story}</p>
                            <button onclick="openItinerary('${t.id}')" class="group inline-flex items-center gap-6 text-[10px] tracking-[0.5em] uppercase text-stone-400 hover:text-black transition-all">
                                <span class="border-b border-stone-200 pb-2 group-hover:border-black">Consult the Compass</span>
                                <span class="text-2xl transition-transform group-hover:translate-x-2">⟶</span>
                            </button>
                        </div>
                    </article>
                `).join('');
            }
        });

        window.openItinerary = function(tripId) {
            const trip = window.allTrips.find(t => t.id === tripId);
            const modal = document.getElementById('itinerary-modal');
            const content = document.getElementById('modal-content');
            if (trip && trip.days) {
                let daysHtml = `<div class="text-center mb-24"><span class="text-[10px] tracking-[0.8em] uppercase opacity-40">The Itinerary</span><h2 class="serif text-7xl italic mt-6">${trip.name}</h2><div class="h-[1px] w-20 bg-[#8d5d46] mx-auto mt-10 opacity-20"></div></div>`;
                Object.values(trip.days).forEach(day => {
                    daysHtml += `<div class="mb-24 max-w-2xl mx-auto"><h3 class="serif text-4xl italic text-stone-800 mb-6">${day.title}</h3><p class="text-stone-500 font-light leading-relaxed text-xl whitespace-pre-wrap">${day.content}</p></div>`;
                });
                content.innerHTML = daysHtml;
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else { alert("Detailed notes for this journey are being transcribed."); }
        };

        window.closeModal = () => { document.getElementById('itinerary-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; };
    </script>
</body>
</html>
