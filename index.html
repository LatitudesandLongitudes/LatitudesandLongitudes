<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latitudes and Longitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-white: #faf9f6;
            --dusty-earth: #8d5d46;
            --muted-gold: #c5a358;
            --charcoal: #2d2a26;
        }
        body { 
            background-color: var(--warm-white); 
            color: var(--charcoal);
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        /* അലോങ് ഡസ്റ്റി റോഡ്‌സ് സ്റ്റൈൽ ഹീറോ സെക്ഷൻ */
        .hero-image {
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body>

    <!-- നവിഗേഷൻ (Along Dusty Roads ലേഔട്ട്) -->
    <nav class="absolute w-full z-50 px-10 py-12 flex justify-between items-center text-white">
        <div class="flex flex-col">
            <h1 class="serif text-3xl font-light tracking-tighter uppercase leading-none">Latitudes and Longitudes.</h1>
            <p class="text-[9px] tracking-[0.5em] uppercase opacity-80 mt-2">The Couple's Archive</p>
        </div>
        <div class="hidden md:flex gap-10 text-[11px] tracking-[0.3em] uppercase font-medium">
            <a href="index.html" class="hover:opacity-60 transition-opacity">Journal</a>
            <a href="admin.html" class="hover:opacity-60 transition-opacity">Admin</a>
        </div>
    </nav>

    <!-- ഫുൾ സ്ക്രീൻ ഹീറോ -->
    <header class="hero-image flex items-center justify-center text-white text-center">
        <div class="max-w-3xl px-6">
            <span class="text-[10px] tracking-[0.6em] uppercase mb-6 block">Current Chapter: The American West</span>
            <h2 class="serif text-6xl md:text-9xl italic leading-tight">Beyond the <br> Horizon.</h2>
        </div>
    </header>

    <!-- ജേർണൽ ലിസ്റ്റ് -->
    <main id="journal-feed" class="max-w-5xl mx-auto py-32 px-6">
        <!-- ഡാറ്റാ ഇവിടെ വരും -->
        <div id="posts-loading" class="text-center py-20">
            <p class="serif text-2xl italic opacity-30">Preparing the pages...</p>
        </div>
    </main>

    <!-- ഫയർബേസ് കണക്ഷൻ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
            messagingSenderId: "831088196667",
            appId: "1:831088196667:web:3b54c623a82d04febbf01e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const feed = document.getElementById('journal-feed');

        onValue(ref(db, 'posts'), (snapshot) => {
            const data = snapshot.val();
            feed.innerHTML = '';
            
            if (data) {
                Object.values(data).reverse().forEach(post => {
                    const postDate = new Date(post.date).toLocaleDateString('en-US', { 
                        year: 'numeric', month: 'long' 
                    });
                    
                    const article = document.createElement('article');
                    article.className = 'grid md:grid-cols-2 gap-16 items-center mb-40 opacity-0 transition-opacity duration-1000';
                    article.innerHTML = `
                        <div class="overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1472396961693-142e6e269027?auto=format&fit=crop&q=80" 
                                 class="w-full h-[500px] object-cover grayscale-[20%] hover:grayscale-0 transition-all duration-700">
                        </div>
                        <div class="text-left">
                            <span class="text-[9px] tracking-[0.4em] uppercase opacity-40 mb-4 block">${postDate}</span>
                            <h3 class="serif text-5xl md:text-6xl mb-6 text-[#8d5d46] italic leading-tight">${post.title.toLowerCase()}</h3>
                            <p class="text-stone-500 leading-relaxed text-base font-light max-w-sm mb-8">
                                ${post.content}
                            </p>
                            <a href="#" class="text-[10px] tracking-[0.3em] uppercase font-bold border-b border-charcoal pb-2">Read Story</a>
                        </div>
                    `;
                    feed.appendChild(article);
                    setTimeout(() => article.style.opacity = '1', 100);
                });
            }
        });
    </script>
</body>
</html>
