<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
        authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
        projectId: "latitudesandlongitudes-3f37b",
        databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com",
        storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
        messagingSenderId: "831088196667",
        appId: "1:831088196667:web:3b54c623a82d04febbf01e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // This 'onValue' function stays awake and watches for changes
    onValue(ref(db, 'itineraries'), (snapshot) => {
        const data = snapshot.val();
        const grid = document.getElementById('story-grid');
        
        if (data) {
            console.log("Archive data received:", data);
            // Convert Firebase object into an array and reverse for newest-first
            const entries = Object.values(data).reverse();
            
            grid.innerHTML = entries.map(item => `
                <div class="mb-24 opacity-0 animate-fade-in">
                    <img src="${item.photo}" class="w-full h-[500px] object-cover mb-8 filter sepia-[20%]">
                    <span class="text-[9px] tracking-widest uppercase text-[#8d5d46]">${item.country || ''}</span>
                    <h2 class="serif text-6xl italic mt-2 mb-6">${item.name}</h2>
                    <p class="text-stone-500 max-w-2xl leading-relaxed">${item.story}</p>
                </div>
            `).join('');
        } else {
            grid.innerHTML = `<p class="serif opacity-30 italic">The journal is currently waiting for its first entry.</p>`;
        }
    }, (error) => {
        console.error("The read failed: ", error);
        document.getElementById('story-grid').innerHTML = "Permission Error: Check Firebase Rules.";
    });
</script>
