<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latitudes & Longitudes | Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
</head>
<body class="bg-[#faf9f6] text-[#2d2a26] font-['Montserrat']">

    <div id="debug-status" class="fixed top-0 left-0 w-full bg-red-100 text-red-800 text-[10px] p-2 text-center z-[100] hidden">
        System Error Detected. Check Console (F12).
    </div>

    <nav class="p-10 text-right">
        <h1 class="serif text-4xl italic tracking-tighter">Latitudes & Longitudes</h1>
        <div class="flex justify-end gap-4 mt-2 opacity-50 text-[10px] tracking-widest">
            <span>HOME</span> / <span>ADMIN</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-20">
        <div id="story-grid" class="space-y-32">
            <p class="text-center serif italic opacity-30 animate-pulse">Initializing Archive Connection...</p>
        </div>
    </main>

    <footer class="py-20 text-center border-t border-stone-200">
        <a href="admin.html" class="text-[8px] tracking-[0.4em] uppercase opacity-20 hover:opacity-100">Admin Mode</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIG WITH EXPLICIT DATABASE URL
        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
            messagingSenderId: "831088196667",
            appId: "1:831088196667:web:3b54c623a82d04febbf01e"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const grid = document.getElementById('story-grid');

            // Listen for data
            onValue(ref(db, 'itineraries'), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const trips = Object.values(data).reverse();
                    grid.innerHTML = trips.map(t => `
                        <article class="border-b border-stone-100 pb-20">
                            <img src="${t.photo}" class="w-full h-96 object-cover bg-stone-100 mb-8" onerror="this.src='https://placehold.co/800x400?text=Image+Not+Found'">
                            <p class="text-[10px] tracking-widest text-[#8d5d46] uppercase mb-2">${t.country || 'Global'}</p>
                            <h2 class="serif text-5xl italic mb-6">${t.name}</h2>
                            <p class="text-stone-500 leading-relaxed font-light">${t.story}</p>
                        </article>
                    `).join('');
                } else {
                    grid.innerHTML = "<p class='text-center opacity-30 italic serif text-2xl'>Archive is empty. Please add a story in Admin.</p>";
                }
            }, (error) => {
                document.getElementById('debug-status').classList.remove('hidden');
                document.getElementById('debug-status').innerText = "Firebase Error: " + error.message;
            });
        } catch (e) {
            document.getElementById('debug-status').classList.remove('hidden');
            document.getElementById('debug-status').innerText = "Script Crash: " + e.message;
        }
    </script>

    <style>
        .serif { font-family: 'Cormorant Garamond', serif; }
    </style>
</body>
</html>
