<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latitudes & Longitudes | Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #faf9f6; --text: #2d2a26; --accent: #8d5d46; --border: #e0dbd1; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .mix-nav { mix-blend-mode: difference; color: white; }
        .nav-pillar { writing-mode: vertical-rl; transform: rotate(180deg); }
        .pillar { border-right: 1px solid var(--border); transition: all 0.5s ease; }
        .pillar:hover { background: #f3f0e9; }
        .story-img { filter: sepia(20%) contrast(90%); }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 w-full z-50 p-8 flex justify-between items-start pointer-events-none">
        <div class="pointer-events-auto mix-nav flex items-center gap-6">
            <a href="index.html" class="serif text-3xl uppercase tracking-tighter">Home.</a>
            <div class="flex gap-4 opacity-50 text-[10px]">
                <a href="#">IG</a> <a href="#">YT</a>
            </div>
        </div>
    </nav>

    <div id="portal" class="flex h-screen w-full fixed top-0 left-0 z-0">
        <div onclick="document.getElementById('explore').scrollIntoView({behavior:'smooth'})" class="w-1/3 pillar flex flex-col items-center justify-center cursor-pointer">
            <span class="nav-pillar text-[10px] tracking-[1em] uppercase opacity-40">Narratives</span>
            <h2 class="serif text-4xl mt-8 italic">Stories</h2>
        </div>
        <div class="w-1/3 pillar flex flex-col items-center justify-center cursor-pointer">
            <span class="nav-pillar text-[10px] tracking-[1em] uppercase opacity-40">Global Log</span>
            <h2 class="serif text-4xl mt-8 italic">Coordinates</h2>
        </div>
        <div class="w-1/3 flex flex-col items-center justify-center cursor-pointer">
            <span class="nav-pillar text-[10px] tracking-[1em] uppercase opacity-40">Itineraries</span>
            <h2 class="serif text-4xl mt-8 italic text-[#8d5d46]">Compass</h2>
        </div>
    </div>

    <section id="explore" class="relative z-10 mt-[100vh] bg-[#faf9f6] border-t border-stone-200 pt-20">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <div class="flex justify-center gap-10 mb-12 text-[10px] tracking-[0.3em] uppercase opacity-50">
                <button onclick="filterContinent('North America')" class="hover:text-[#8d5d46]">North America</button>
                <button onclick="filterContinent('Europe')" class="hover:text-[#8d5d46]">Europe</button>
                <button onclick="filterContinent('Asia')" class="hover:text-[#8d5d46]">Asia</button>
            </div>
            <div id="country-list" class="flex justify-center gap-8 mb-20 serif italic text-2xl opacity-60"></div>
            
            <div id="story-grid" class="space-y-40 pb-40">
                </div>
        </div>
    </section>

    <footer class="relative z-10 bg-[#faf9f6] border-t border-stone-200 py-20 text-center">
        <p class="serif italic opacity-40 text-2xl">Latitudes & Longitudes</p>
        <a href="admin.html" class="block mt-10 text-[8px] tracking-[0.4em] uppercase opacity-20">Admin Access</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* SAME AS ABOVE */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allTrips = [];

        onValue(ref(db, 'itineraries'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                allTrips = Object.values(data);
                renderStories(allTrips);
            }
        });

        window.filterContinent = (cont) => {
            const countries = [...new Set(allTrips.filter(t => t.continent === cont).map(t => t.country))];
            const div = document.getElementById('country-list');
            div.innerHTML = countries.map(c => `<span class="cursor-pointer" onclick="filterCountry('${c}')">${c}</span>`).join('');
        };

        window.filterCountry = (c) => renderStories(allTrips.filter(t => t.country === c));

        function renderStories(trips) {
            const grid = document.getElementById('story-grid');
            grid.innerHTML = trips.map(t => `
                <article class="grid md:grid-cols-2 gap-12 items-center text-left">
                    <img src="${t.photo}" class="story-img h-[500px] w-full object-cover">
                    <div>
                        <span class="text-[9px] tracking-[0.5em] uppercase text-[#8d5d46]">${t.coords}</span>
                        <h4 class="serif text-7xl italic my-6">${t.name}</h4>
                        <p class="text-stone-500 font-light leading-relaxed mb-8">${t.story}</p>
                        <button class="border-b border-black text-[10px] tracking-widest uppercase pb-1">Open Itinerary</button>
                    </div>
                </article>
            `).join('');
        }
    </script>
</body>
</html>
