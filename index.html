<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latitudes and Longitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #faf9f6; --text: #2d2a26; --accent: #8d5d46; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Hero Background Styling */
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070'); /* Replace with your couple photo */
            background-size: cover;
            background-position: center;
            height: 100vh;
            filter: sepia(15%);
        }

        .mix-nav { mix-blend-mode: difference; color: white; }
        .nav-pillar { writing-mode: vertical-rl; transform: rotate(180deg); }
        
        /* Pillar Overlay Styling */
        .pillar-container {
            background: rgba(250, 249, 246, 0.85); /* Earthy sand color with transparency */
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 w-full z-50 p-8 flex justify-between items-start pointer-events-none">
        <div class="pointer-events-auto mix-nav flex items-center gap-6">
            <a href="index.html" class="serif text-3xl uppercase tracking-tighter">Home.</a>
            <div class="flex gap-4 opacity-70 text-[10px] tracking-widest">
                <a href="#">IG</a> <a href="#">YT</a>
            </div>
        </div>
    </nav>

    <section class="relative h-screen w-full flex flex-col items-center justify-center text-center text-white hero-bg">
        <div class="z-10 mix-nav">
            <p class="text-[10px] tracking-[0.8em] uppercase mb-4 opacity-80">39.5501° N, 105.7821° W</p>
            <h1 class="serif text-7xl md:text-9xl italic font-light tracking-tighter">Latitudes & Longitudes</h1>
            <div class="h-[1px] w-24 bg-white mx-auto mt-8 opacity-40"></div>
        </div>
        
        <div class="absolute bottom-10 animate-bounce opacity-50">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
        </div>
    </section>

    <section id="portal" class="relative z-20 flex h-[60vh] w-full border-t border-stone-200 pillar-container">
        <div onclick="document.getElementById('explore').scrollIntoView({behavior:'smooth'})" class="w-1/3 border-r border-stone-200 flex flex-col items-center justify-center hover:bg-[#f3f0e9] transition-all cursor-pointer group">
            <span class="nav-pillar text-[9px] tracking-[1em] uppercase opacity-40 group-hover:opacity-100 transition-opacity">The Stories</span>
            <h2 class="serif text-4xl mt-8 italic">Narratives</h2>
        </div>
        <div class="w-1/3 border-r border-stone-200 flex flex-col items-center justify-center hover:bg-[#f3f0e9] transition-all cursor-pointer group">
            <span class="nav-pillar text-[9px] tracking-[1em] uppercase opacity-40 group-hover:opacity-100 transition-opacity">Global Log</span>
            <h2 class="serif text-4xl mt-8 italic">Coordinates</h2>
        </div>
        <div class="w-1/3 flex flex-col items-center justify-center hover:bg-[#f3f0e9] transition-all cursor-pointer group">
            <span class="nav-pillar text-[9px] tracking-[1em] uppercase opacity-40 group-hover:opacity-100 transition-opacity">Itineraries</span>
            <h2 class="serif text-4xl mt-8 italic text-[#8d5d46]">Compass</h2>
        </div>
    </section>

    <section id="explore" class="relative z-10 bg-[#faf9f6] py-32">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-center gap-12 mb-12 text-[10px] tracking-[0.4em] uppercase opacity-40">
                <button onclick="filterContinent('North America')" class="hover:text-[#8d5d46]">North America</button>
                <button onclick="filterContinent('Europe')" class="hover:text-[#8d5d46]">Europe</button>
                <button onclick="filterContinent('Asia')" class="hover:text-[#8d5d46]">Asia</button>
            </div>
            <div id="country-list" class="flex justify-center gap-10 mb-24 serif italic text-3xl opacity-60"></div>
            
            <div id="story-grid" class="space-y-48 pb-20">
                </div>
        </div>
    </section>

    </body>
</html>
