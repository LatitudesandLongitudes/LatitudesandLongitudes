<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latitudes and Longitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #faf9f6; color: #2d2a26; font-family: 'Montserrat', sans-serif; }
        .serif { font-family: 'Cormorant Garamond', serif; }
    </style>
</head>
<body>
    <nav class="p-8 flex justify-between border-b border-stone-200">
        <h1 class="serif text-2xl font-bold uppercase tracking-tighter">Latitudes and Longitudes.</h1>
        <a href="login.html" class="text-xs uppercase tracking-widest border border-black px-4 py-1">Admin</a>
    </nav>

    <div id="posts-container" class="max-w-4xl mx-auto py-20 px-6">
        <div id="status" class="serif text-4xl italic text-center text-stone-400">Loading Journal...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyfXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com/",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
            messagingSenderId: "831088196667",
            appId: "1:831088196667:web:3b54c623a82d04febbf01e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'posts'), (snapshot) => {
            const container = document.getElementById('posts-container');
            const data = snapshot.val();
            if(data) {
                container.innerHTML = "";
                Object.values(data).reverse().forEach(post => {
                    container.innerHTML += `
                        <div class="mb-20 animate-fade-in text-center">
                            <h2 class="serif text-5xl italic mb-6">${post.title}</h2>
                            <p class="serif text-2xl text-stone-700 leading-relaxed mb-4 italic px-10">${post.content}</p>
                            <span class="text-[10px] tracking-widest uppercase text-stone-400">${new Date(post.date).toDateString()}</span>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = "<div class='serif text-3xl italic text-center'>No stories found. Log in to add one.</div>";
            }
        });
    </script>
</body>
</html>
