<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latitudes & Longitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #faf9f6; --text: #2d2a26; --accent: #8d5d46; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070');
            background-size: cover; background-position: center; height: 100vh;
        }
        .mix-nav { mix-blend-mode: difference; color: white; }
    </style>
</head>
<body>

    <nav class="fixed top-0 right-0 z-50 p-10 text-right mix-nav">
        <a href="index.html" class="serif text-3xl uppercase tracking-tighter block">Home.</a>
        <div class="flex justify-end gap-4 mt-2 opacity-70 text-[10px] tracking-widest">
            <a href="#">IG</a> <a href="#">YT</a>
        </div>
    </nav>

    <section class="relative h-screen w-full flex flex-col items-center justify-center text-center hero-bg">
        <div class="mix-nav">
            <p class="text-[10px] tracking-[0.8em] uppercase mb-4 opacity-80">39.55° N, 105.78° W</p>
            <h1 class="serif text-7xl md:text-9xl italic font-light tracking-tighter">Latitudes & Longitudes</h1>
        </div>
    </section>

    <section class="py-32 px-6">
        <div id="story-grid" class="max-w-5xl mx-auto space-y-40">
            <p class="text-center opacity-30 italic serif text-xl">Connecting to the archive...</p>
        </div>
    </section>

    <footer class="py-20 text-center border-t border-stone-200">
        <p class="serif italic opacity-40 text-2xl">Latitudes & Longitudes</p>
        <a href="admin.html" class="block mt-8 text-[8px] tracking-[0.4em] uppercase opacity-20 hover:opacity-100">Admin Mode</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAecvrfHyFXRGF3kkr-nL2vEhyIn4tZmU0",
            authDomain: "latitudesandlongitudes-3f37b.firebaseapp.com",
            projectId: "latitudesandlongitudes-3f37b",
            databaseURL: "https://latitudesandlongitudes-3f37b-default-rtdb.firebaseio.com",
            storageBucket: "latitudesandlongitudes-3f37b.firebasestorage.app",
            messagingSenderId: "831088196667",
            appId: "1:831088196667:web:3b54c623a82d04febbf01e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const grid = document.getElementById('story-grid');

        onValue(ref(db, 'itineraries'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const trips = Object.values(data).reverse();
                grid.innerHTML = trips.map(t => `
                    <div class="text-left">
                        <img src="${t.photo}" class="w-full h-[500px] object-cover mb-8" onerror="this.src='https://placehold.co/800x600?text=Image+Not+Found'">
                        <span class="text-[9px] tracking-widest uppercase text-[#8d5d46]">${t.country || ''}</span>
                        <h2 class="serif text-6xl italic mt-2 mb-6">${t.name}</h2>
                        <p class="text-stone-500 leading-relaxed max-w-2xl">${t.story}</p>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = "<p class='text-center opacity-30'>The archive is currently empty. Try adding data in Admin Mode.</p>";
            }
        }, (error) => {
            grid.innerHTML = `<p class='text-red-500'>Connection Error: ${error.message}</p>`;
        });
    </script>
</body>
</html>
